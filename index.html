<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ANTAM ELITE STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#0a0a0a;
color:#fff;
}

/* HEADER */
header{
background:linear-gradient(90deg,#d4af37,#ffd700,#fff);
color:#000;
padding:18px;
text-align:center;
font-weight:700;
font-size:22px;
}

/* TITLE */
.title{
text-align:center;
font-size:26px;
margin:25px 0;
}

/* CONTAINER */
.container{
max-width:600px;
margin:auto;
padding:15px;
}

/* PRODUCT CARD */
.product{
background:#000;
border:1px solid #ffd700;
border-radius:25px;
padding:18px;
margin-bottom:25px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.8);
}

/* BADGE */
.badge{
display:inline-block;
background:#ffd700;
color:#000;
padding:6px 14px;
border-radius:20px;
font-size:12px;
margin-bottom:10px;
font-weight:600;
}

/* TITLE */
.product h3{
margin:5px 0;
font-size:22px;
}

.product b{
font-size:20px;
}

/* IMAGE FRAME (KUNCI) */
.img-frame{
background:#fff;
border-radius:22px;
padding:18px;
margin-top:15px;
box-shadow:inset 0 0 10px rgba(0,0,0,0.05);
}

/* FIX RATIO */
.img-wrap{
width:100%;
aspect-ratio:1/1;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* IMAGE */
.img-wrap img{
width:100%;
height:100%;
object-fit:contain;
}

/* FORM */
.card{
background:#111;
padding:20px;
border-radius:20px;
margin-top:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

.btn{
width:100%;
background:#ffd700;
color:#000;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
font-weight:700;
}

/* WA */
.wa{
position:fixed;
bottom:20px;
right:20px;
background:green;
padding:15px;
border-radius:50%;
color:#fff;
}

/* FOOTER */
footer{
background:#000;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>
</head>

<body>

<header>
PT ANTAM GOLD INDONESIA • ELITE
</header>

<div class="title">Produk Emas ANTAM</div>

<div class="container">

<!-- PRODUK -->
<script>
const produk = [
["1 Gram","2.800.000","IMG-20260417-1GRAM.jpg"],
["3 Gram","8.400.000","IMG-20260417-3GRAM.jpg"],
["5 Gram","14.060.000","IMG-20260417-5GRAM.jpg"],
["10 Gram","28.900.000","IMG-20260417-10GRAM.jpg"],
["25 Gram","70.080.000","IMG-20260417-25GRAM.jpg"],
["50 Gram","140.000.000","IMG-20260417-50GRAM.jpg"]
];

document.write(produk.map(p=>`
<div class="product">
<div class="badge">ORI</div>
<h3>${p[0]}</h3>
<b>Rp ${p[1]}</b>

<div class="img-frame">
<div class="img-wrap">
<img src="${p[2]}">
</div>
</div>

</div>
`).join(""));
</script>

<!-- FORM -->
<div class="card">
<h2>Form Pembelian</h2>

<input id="nama" placeholder="Nama">
<input id="alamat" placeholder="Alamat">

<select id="produk">
<option>1 Gram</option>
<option>3 Gram</option>
<option>5 Gram</option>
<option>10 Gram</option>
<option>25 Gram</option>
<option>50 Gram</option>
</select>

<button class="btn" onclick="order()">Pesan</button>
<p id="invoice"></p>
</div>

<!-- REKENING -->
<div class="card">
<h2>Pembayaran</h2>
<p>BNI 2008767103</p>
<p>A/N M ILHAM SIRAIT</p>
</div>

</div>

<a href="https://wa.me/6283172766800" class="wa">WA</a>

<footer>© 2026 ANTAM</footer>

<script>
function order(){
let n=nama.value,a=alamat.value,p=produk.value;
if(!n||!a){alert("Isi data!");return;}

let inv="INV"+Math.floor(Math.random()*999999);
invoice.innerText="Invoice: "+inv;

window.open("https://wa.me/6283172766800?text=Invoice:"+inv);
}
</script>

</body>
</html>
